version: '3.5'

networks:
  agent:

services:
  agent:
    image: research-agent:${AGENT_VERSION}
    build:
      context: ../agents
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - agent
    stdin_open: true
    tty: true
    volumes:
      - ../agents:/app
      - ../data:/data
      - ../notebooks:/notebooks
    ports:
      - 8889:8888

