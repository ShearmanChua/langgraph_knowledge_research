version: '3.5'

networks:
  agent:

services:
  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:${WEAVIATE_VERSION}
    env_file:
      - .env
    networks:
      - agent
    command:
      - --host
      - 0.0.0.0
      - --port
      - ${WEAVIATE_HTTP_PORT}
      - --scheme
      - http
    ports:
      - ${WEAVIATE_HTTP_PORT}:${WEAVIATE_HTTP_PORT}
      - ${WEAVIATE_GRPC_PORT}:${WEAVIATE_GRPC_PORT}
    restart: on-failure:0
    volumes:
      - ../vector_db/var/weaviate:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      CLUSTER_HOSTNAME: 'node1'
      ENABLE_MODULES: text2vec-transformers # Enable this module
      TRANSFORMERS_INFERENCE_API: http://text2vec-transformers:8080
  text2vec-transformers:
    image: docker.io/semitechnologies/transformers-inference:all-mpnet-base-v2
    container_name: text2vec-transformers
    ports:
      - "8080:8080"
    environment:
      ENABLE_CUDA: 1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
  postgres:
    image: postgres:${POSTGRES_VERSION}
    env_file:
      - .env
    networks:
      - agent
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - ../postgres_db/data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    env_file:
      - .env
    networks:
      - agent
    ports:
      - ${PGADMIN_PORT}:80
    volumes:
      - ../pgadmin_data:/var/lib/pgadmin

  neo4j:
    image: neo4j:5.19
    env_file:
      - .env
    networks:
      - agent
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
volumes:
  neo4j_data:
  neo4j_logs: